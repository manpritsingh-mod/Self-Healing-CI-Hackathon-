version: "3.8"

services:
  # ── Jenkins Server ──
  jenkins:
    build:
      context: ./jenkins-config
      dockerfile: Dockerfile
    container_name: jenkins
    ports:
      - "9080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - healing-network
    restart: unless-stopped

  # ── Self-Healing Engine (Python FastAPI) ──
  healing-engine:
    build:
      context: ./healing-engine
      dockerfile: Dockerfile
    container_name: healing-engine
    ports:
      - "5000:5000"
    volumes:
      - ./healing-engine:/app
      - chroma_data:/app/data
    env_file:
      - .env
    depends_on:
      - jenkins
    networks:
      - healing-network
    restart: unless-stopped

  # ── Ollama (Local LLM fallback) ──
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - healing-network
    restart: unless-stopped

volumes:
  jenkins_data:
  chroma_data:
  ollama_data:

networks:
  healing-network:
    driver: bridge
